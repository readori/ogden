name = "ogden-basic-english"
main = "src/index.js"
compatibility_date = "2026-05-24"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "ogden_basic_english"
database_id = "replace-with-cloudflare-d1-database-id"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "replace-with-cloudflare-kv-namespace-id"
preview_id = "replace-with-cloudflare-kv-preview-namespace-id"
